<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kid Friendly 3D Art Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Kid Friendly 3D Art Gallery</h1>
      <p>Use <strong>W A S D</strong> to move</p>
      <p>Use <strong>Arrow Keys</strong> to look around</p>
      <p class="hint">Walk through 4 connected rooms and explore the art.</p>
    </div>

    <canvas id="scene" aria-label="3D gallery view"></canvas>

    <script src="https://unpkg.com/three@0.164.1/build/three.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
