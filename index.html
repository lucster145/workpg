<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kid Friendly 2D Art Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Kid Friendly 2D Art Gallery</h1>
      <p>Use <strong>Arrow Up/Down</strong> to move</p>
      <p>Use <strong>Arrow Left/Right</strong> to turn</p>
      <p class="hint">Walk through 100 rooms of art! Talk to colorful characters along the way.</p>
    </div>

    <canvas id="scene" aria-label="2D gallery view"></canvas>

    <script src="app.js"></script>
  </body>
</html>
